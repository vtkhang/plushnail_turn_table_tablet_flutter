name: Build iOS IPA
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Reconstruct .env
        run: echo "${{ secrets.ENV_FILE }}" > .env

      - name: Install dependencies
        run: flutter pub get

      - name: Install Certificates
        env:
          P12_BASE64: ${{ secrets.P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          PROVISION_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
        run: |
          # Create temporary keychain
          security create-keychain -p "" build.keychain
          security list-keychains -s build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          
          # Decode certificate and provisioning profile using printf for reliability
          printf '%s' "$P12_BASE64" | tr -d '\n ' | base64 --decode > release.p12
          printf '%s' "$PROVISION_BASE64" | tr -d '\n ' | base64 --decode > release.mobileprovision
          
          # Safe Debugging: Check file integrity without exposing secrets
          echo "Debug: release.p12 size: $(stat -f%z release.p12) bytes"
          echo "Debug: release.p12 MD5: $(md5 -q release.p12)"
          echo "Debug: release.mobileprovision size: $(stat -f%z release.mobileprovision) bytes"
          
          # Test if OpenSSL can read the p12 with the provided password
          if openssl pkcs12 -info -in release.p12 -passin pass:"$P12_PASSWORD" -noout; then
            echo "Success: OpenSSL verified the p12 password."
          else
            echo "Error: OpenSSL could not verify the p12 password."
          fi
          
          # Import certificate and install profile
          security import release.p12 -k build.keychain -P "$P12_PASSWORD" -A -T /usr/bin/codesign
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp release.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/
          
      - name: Build IPA
        run: flutter build ipa --release --export-options-plist=ios/ExportOptions.plist

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: plush-turn-table-ipa
          path: build/ios/ipa/*.ipa
